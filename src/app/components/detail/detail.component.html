<ion-content>
  <ion-label class="titulo">
    <h1>{{ movieDetail.title }}</h1>
  </ion-label>

  <img [src]="movieDetail.backdrop_path | imagen" alt="{{ movieDetail.title }}" *ngIf="movieDetail.backdrop_path">

  <ion-grid>
    <ion-row>
      <ion-col size="4" class="poster-detalle-sobre">
        <ion-card class="poster">
          <img [src]="movieDetail.poster_path | imagen" alt="{{ movieDetail.title }}" *ngIf="movieDetail.poster_path"
            class="poster">
        </ion-card>
      </ion-col>

      <ion-col>
        <ion-item>
          <ion-icon slot="start" name="thumbs-up" color="primary"></ion-icon>
          <ion-label>Rating</ion-label>
          <ion-note slot="end" color="primary">{{ movieDetail.vote_average }}</ion-note>
        </ion-item>
        <ion-item>
          <ion-icon slot="start" name="people" color="primary"></ion-icon>
          <ion-label>Votos</ion-label>
          <ion-note slot="end" color="primary">{{ movieDetail.vote_count }}</ion-note>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-grid fixed>
    <ion-row>
      <ion-col size="12">
        <ion-label>{{ movieDetail.overview | slice:0:totalCharacters }}</ion-label>
        <ion-label *ngIf="showReadMore">... </ion-label>
        <ion-label color="primary" (click)="showDescription()" *ngIf="showReadMore">Read More!</ion-label>
      </ion-col>
    </ion-row>
    <ion-col size="12">
      <ion-chip color="primary" mode="ios" outline="true" *ngFor="let genre of movieDetail.genres">
        <ion-label>{{ genre.name }}</ion-label>
      </ion-chip>
    </ion-col>
  </ion-grid>
  <ion-grid fixed>
    <ion-row>
      <ion-col size="12">
        <ion-label>Actors</ion-label>
      </ion-col>
    </ion-row>
  </ion-grid>

  <swiper-container direction="horizontal" pager="ios" pagination="true" slides-per-view="3.3" free-mode="true"
    space-between="-5">
    <swiper-slide *ngFor="let actor of actors">
      <ion-card class="card-actor">
        <img *ngIf="!actor.profile_path" src="./assets/no-avatar.jpg" alt="actor.name">
        <img *ngIf="actor.profile_path" [src]="actor.profile_path | imagen" alt="actor.name">
        <ion-label class="actor-name">{{ actor.name }}</ion-label>
      </ion-card>
    </swiper-slide>
  </swiper-container>


</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar>
    <ion-butttons slot="start">
      <ion-button slot="start" color="primary" fill="outline" expand="block" (click)="goBack()">
        <ion-icon name="arrow-back"></ion-icon>
        <ion-label>Back</ion-label>
      </ion-button>
    </ion-butttons>
    <ion-butttons slot="end">
      <ion-button color="primary" fill="outline" expand="block" (click)="addFavorite()">
        <ion-label>Favorite</ion-label>
        <ion-icon slot="end" [name]="star"></ion-icon>
      </ion-button>
    </ion-butttons>
  </ion-toolbar>
</ion-footer>
