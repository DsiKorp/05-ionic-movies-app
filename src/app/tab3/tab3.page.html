<app-header title="Favorites"></app-header>

<ion-content [fullscreen]="true">

  <ion-grid fixed>
    <ion-row>
      <ion-col>Favorites by genre</ion-col>
    </ion-row>
  </ion-grid>

  <div *ngFor="let category of favoritesByGenre">
    <ion-grid fixed *ngIf="category.movies.length > 0">
      <ion-row>
        <ion-col>{{ category.genre }}</ion-col>
      </ion-row>
      <app-slideshow-poster-detail [movies]="category.movies" (modalClosed)="onModalClosed()"></app-slideshow-poster-detail>
    </ion-grid>
  </div>

</ion-content>
